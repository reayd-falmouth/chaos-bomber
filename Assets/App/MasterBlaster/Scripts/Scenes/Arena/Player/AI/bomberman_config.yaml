# Simple training: agent learns to move toward opponent and place a bomb beside them.
# Run: mlagents-learn Assets/Scripts/Scenes/Arena/Player/AI/bomberman_config.yaml --run-id=v1
#
# Observations use XZ plane (world x, world z); retrain policies after physics/plane changes.

behaviors:
  BombermanAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 64
      buffer_size: 2048
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: false
      hidden_units: 128
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 500000
    time_horizon: 64
    summary_freq: 10000
