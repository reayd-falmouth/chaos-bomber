name: Setup third-party assets from S3
description: >-
  Downloads a zip of vendor Unity assets (e.g. Feel under Assets/3rdParty) from a private S3 bucket
  and extracts into Assets/. The archive root should match what you want under Assets/ (e.g. a
  top-level 3rdParty/ folder).

inputs:
  aws-access-key-id:
    description: AWS access key with s3:GetObject on the bucket object
    required: true
  aws-secret-access-key:
    description: AWS secret access key
    required: true
  aws-region:
    description: AWS region for the bucket
    required: false
    default: eu-west-1
  s3-bucket:
    description: S3 bucket name
    required: false
    default: masterblaster-unity-3rdparty-assets-eu-west-1-093581297635
  s3-object-key:
    description: Object key for the zip file in the bucket
    required: false
    default: 3rdparty-ci.zip

runs:
  using: composite
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        aws-region: ${{ inputs.aws-region }}

    - name: Download and extract third-party assets
      shell: bash
      run: |
        set -euo pipefail
        BUCKET="${{ inputs.s3-bucket }}"
        KEY="${{ inputs.s3-object-key }}"
        DEST="${RUNNER_TEMP}/thirdparty.zip"
        echo "Downloading s3://${BUCKET}/${KEY}"
        aws s3 cp "s3://${BUCKET}/${KEY}" "${DEST}"
        mkdir -p Assets
        unzip -q -o "${DEST}" -d Assets
        echo "Third-party assets extracted under Assets/"

        # URP-only gameplay: remove HDRP-only vendor trees from the zip (demo/sample asmrefs without HDRP package)
        for p in \
          "Assets/3rdParty/Vendor/Feel/FeelDemosHDRP" \
          "Assets/3rdParty/Vendor/Feel/MMFeedbacks/MMFeedbacksForThirdParty/HDRP" \
          "Assets/3rdParty/Vendor/DAVFX/Realistic 6D Lighting Explosions/HDRP"
        do
          if [ -e "$p" ]; then
            echo "Removing HDRP-only path: $p"
            rm -rf "$p"
          fi
        done
