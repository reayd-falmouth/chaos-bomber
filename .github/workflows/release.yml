name: Build and Release 🚀🚀🚀

env:
  ITCHIO_USER: reayd-falmouth
  ITCH_PROJECT: masterblaster

on:
  workflow_dispatch:
  push:
    tags:
      - '*'  # Runs on any tag push

jobs:
  build:
    name: Build Unity project ✨ on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            targetPlatform: StandaloneLinux64
            artifactName: Linux
            channel: linux
          - os: macos-latest
            targetPlatform: StandaloneOSX
            artifactName: macOS
            channel: mac
          - os: windows-latest
            targetPlatform: StandaloneWindows64
            artifactName: Windows
            channel: windows
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup third-party assets from S3
        uses: ./.github/actions/setup-thirdparty-assets
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          s3-object-key: ${{ vars.S3_THIRDPARTY_OBJECT_KEY || '3rdparty-ci.zip' }}

      - name: Cache
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}
          allowDirtyBuild: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: build

  release:
    name: Release to Itch.io
    needs: [ build ]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            targetPlatform: StandaloneLinux64
            artifactName: Linux
            channel: linux
          - os: macos-latest
            targetPlatform: StandaloneOSX
            artifactName: macOS
            channel: mac
          - os: windows-latest
            targetPlatform: StandaloneWindows64
            artifactName: Windows
            channel: windows
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Deploy ${{ matrix.targetPlatform }} Build to Itch.io
        uses: robpc/itchio-upload-action@v1
        with:
          # Changed the path to use the artifact folder directly rather than a non-existent build/<artifactName>
          path: ${{ matrix.artifactName }}
          project: ${{ env.ITCHIO_USER }}/${{ env.ITCH_PROJECT }}
          channel: ${{ matrix.channel }}
          version: ${{ github.ref_name }}
          api-key: ${{ secrets.ITCHIO_API_KEY }}
