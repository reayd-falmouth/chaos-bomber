name: Unity Build Reusable

on:
  workflow_call:
    inputs:
      do_release:
        description: Run the Itch.io release job after build
        required: false
        type: boolean
        default: false
      release_version:
        description: Version label for Itch.io uploads
        required: false
        type: string
        default: ""
      source_run_id:
        description: Existing CI run ID to source artifacts from (skip local builds when set)
        required: false
        type: string
        default: ""
      source_build_sha:
        description: Commit SHA to resolve latest successful build artifacts from
        required: false
        type: string
        default: ""
      s3_artifact_prefix:
        description: Prefix in S3 bucket for CI artifacts
        required: false
        type: string
        default: "ci-artifacts/"
    secrets:
      UNITY_LICENSE:
        required: true
      UNITY_EMAIL:
        required: true
      UNITY_PASSWORD:
        required: true
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      ITCHIO_API_KEY:
        required: false
      APPLE_CONNECT_EMAIL:
        required: false
      APPLE_DEVELOPER_EMAIL:
        required: false
      APPLE_TEAM_ID:
        required: false
      APPSTORE_ISSUER_ID:
        required: false
      APPSTORE_KEY_ID:
        required: false
      APPSTORE_P8:
        required: false
      IOS_BUNDLE_ID:
        required: false
      PROJECT_NAME:
        required: false
      MATCH_S3_BUCKET:
        required: false
      MATCH_S3_REGION:
        required: false

env:
  ITCHIO_USER: reayd-falmouth
  ITCH_PROJECT: masterblaster
  S3_ARTIFACT_BUCKET: ${{ vars.S3_ARTIFACT_BUCKET || vars.S3_THIRDPARTY_BUCKET || 'masterblaster-unity-3rdparty-assets-eu-west-1-093581297635' }}
  S3_ARTIFACT_REGION: ${{ vars.S3_ARTIFACT_REGION || 'eu-west-1' }}
  S3_ARTIFACT_PREFIX: ${{ inputs.s3_artifact_prefix }}

jobs:
  build:
    if: inputs.source_run_id == '' && inputs.source_build_sha == ''
    name: ${{ format('Build Unity project ({0} | {1}) on {2}', matrix.targetPlatform, matrix.artifactName, matrix.os) }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            targetPlatform: StandaloneOSX
            artifactName: macOS
            channel: mac
            customImage: ""
          - os: macos-15
            targetPlatform: StandaloneOSX
            artifactName: macOS-Intel
            channel: mac-intel
            customImage: ""
          - os: macos-latest
            targetPlatform: iOS
            artifactName: iOS
            channel: ""
            customImage: ""
          # Windows IL2CPP via game-ci Linux editor image (cross-compile; avoids windows-latest runner issues)
          - os: ubuntu-latest
            targetPlatform: StandaloneWindows64
            artifactName: Windows
            channel: windows
            customImage: ""
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup third-party assets from S3
        uses: ./.github/actions/setup-thirdparty-assets
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          s3-object-key: ${{ vars.S3_THIRDPARTY_OBJECT_KEY || '3rdparty-ci.zip' }}

      - name: Cache
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Install Blender (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install --cask blender
          sudo ln -sf /Applications/Blender.app/Contents/MacOS/Blender /usr/local/bin/blender

      - name: Install Blender (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y blender

      - name: Build Unity Docker image with Blender (Windows)
        if: runner.os == 'Windows' && matrix.customImage != ''
        shell: powershell
        run: |
          $raw = Get-Content "ProjectSettings/ProjectVersion.txt" -Raw
          if ($raw -notmatch '(?m)^m_EditorVersion:\s*(.+)\s*$') { throw "Could not read m_EditorVersion from ProjectSettings/ProjectVersion.txt" }
          $version = $Matches[1].Trim()
          $base = "unityci/editor:windows-$version-windows-il2cpp-3"
          docker pull $base
          docker build `
            --build-arg "UNITY_IMAGE=$base" `
            -f .github/docker/UnityEditorWindowsBlender.dockerfile `
            -t unity-ci-win-blender:local `
            .

      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}
          allowDirtyBuild: true
          customImage: ${{ matrix.customImage }}

      - name: Upload Unity Editor.log (Windows)
        if: failure() && runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: unity-editor-log-windows
          path: |
            C:\Users\runneradmin\AppData\Local\Unity\Editor\Editor.log
            C:\Users\ContainerAdministrator\AppData\Local\Unity\Editor\Editor.log
            D:\a\_temp\_github_workflow\**\Editor.log
            D:\a\MasterBlaster_FPS\MasterBlaster_FPS\**\Editor.log
          if-no-files-found: warn

      - name: Upload Unity Editor.log (macOS)
        if: failure() && runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: unity-editor-log-macos
          path: /Users/runner/Library/Logs/Unity/Editor.log
          if-no-files-found: warn

      - name: Upload Unity Editor.log (Linux)
        if: failure() && runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: unity-editor-log-linux
          path: |
            /home/runner/.config/unity3d/**/Editor.log
            ${{ github.workspace }}/**/Editor.log
          if-no-files-found: warn

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: build

      - name: Configure AWS credentials for S3 artifact publish
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.S3_ARTIFACT_REGION }}

      - name: Upload build artifact to S3 (decoupled build output)
        shell: bash
        run: |
          set -euo pipefail
          ARTIFACT_NAME="${{ matrix.artifactName }}"
          KEY_BASE="${S3_ARTIFACT_PREFIX}${GITHUB_REPOSITORY}/${GITHUB_RUN_ID}/${ARTIFACT_NAME}"
          ARCHIVE_PATH="${RUNNER_TEMP}/${ARTIFACT_NAME}.tar.gz"

          echo "Creating archive for build output: ${ARCHIVE_PATH}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            tar -czf "${ARCHIVE_PATH}" -C build .
          else
            tar -czf "${ARCHIVE_PATH}" -C build .
          fi

          aws s3 cp "${ARCHIVE_PATH}" "s3://${S3_ARTIFACT_BUCKET}/${KEY_BASE}/bundle.tar.gz"
          python3 - <<'PY' > "${RUNNER_TEMP}/metadata.json"
          import json, os
          print(json.dumps({
            "repository": os.getenv("GITHUB_REPOSITORY"),
            "run_id": os.getenv("GITHUB_RUN_ID"),
            "sha": os.getenv("GITHUB_SHA"),
            "ref": os.getenv("GITHUB_REF_NAME"),
            "workflow": os.getenv("GITHUB_WORKFLOW"),
            "platform": os.getenv("ARTIFACT_NAME"),
            "artifact_name": os.getenv("ARTIFACT_NAME"),
            "release_version": os.getenv("RELEASE_VERSION", ""),
          }))
          PY
          aws s3 cp "${RUNNER_TEMP}/metadata.json" "s3://${S3_ARTIFACT_BUCKET}/${KEY_BASE}/metadata.json"
        env:
          ARTIFACT_NAME: ${{ matrix.artifactName }}
          RELEASE_VERSION: ${{ inputs.release_version }}

  release:
    name: Release to Itch.io
    if: inputs.do_release
    needs: [build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifactName: macOS
            channel: mac
          - artifactName: macOS-Intel
            channel: mac-intel
          - artifactName: Windows
            channel: windows
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.S3_ARTIFACT_REGION }}

      - name: Resolve source run id
        id: resolve_run
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.source_run_id }}" ]; then
            echo "run_id=${{ inputs.source_run_id }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "${{ inputs.source_build_sha }}" ]; then
            RID="$(gh run list --limit 50 --json databaseId,headSha,status,conclusion --jq '.[] | select(.headSha=="${{ inputs.source_build_sha }}" and .status=="completed" and .conclusion=="success") | .databaseId' | head -n1)"
            if [ -n "${RID}" ]; then
              echo "run_id=${RID}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Unable to resolve source run for sha ${{ inputs.source_build_sha }}" >&2
            exit 1
          fi
          echo "run_id=${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Download ${{ matrix.artifactName }} artifact from S3
        id: s3_download
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          ART="${{ matrix.artifactName }}"
          RUN_ID="${{ steps.resolve_run.outputs.run_id }}"
          KEY="s3://${S3_ARTIFACT_BUCKET}/${S3_ARTIFACT_PREFIX}${GITHUB_REPOSITORY}/${RUN_ID}/${ART}/bundle.tar.gz"
          ARCHIVE="${RUNNER_TEMP}/${ART}.tar.gz"
          aws s3 cp "${KEY}" "${ARCHIVE}"
          mkdir -p "${ART}"
          tar -xzf "${ARCHIVE}" -C "${ART}"

      - name: Download ${{ matrix.artifactName }} artifact (GitHub fallback)
        if: steps.s3_download.outcome == 'failure'
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: ${{ matrix.artifactName }}

      - name: Deploy ${{ matrix.artifactName }} Build to Itch.io
        uses: robpc/itchio-upload-action@v1
        with:
          path: ${{ matrix.artifactName }}
          project: ${{ env.ITCHIO_USER }}/${{ env.ITCH_PROJECT }}
          channel: ${{ matrix.channel }}
          version: ${{ inputs.release_version != '' && inputs.release_version || github.ref_name }}
          api-key: ${{ secrets.ITCHIO_API_KEY }}

  ios-testflight:
    name: Publish iOS to TestFlight
    if: inputs.do_release
    needs: [build]
    runs-on: macos-15
    env:
      # Matches game-ci unity-builder layout: build/iOS/iOS/Unity-iPhone.xcodeproj (see Fastfile #{IOS_BUILD_PATH}/iOS/...)
      IOS_BUILD_PATH: ${{ format('{0}/build/iOS', github.workspace) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.S3_ARTIFACT_REGION }}

      - name: Resolve source run id
        id: resolve_run
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.source_run_id }}" ]; then
            echo "run_id=${{ inputs.source_run_id }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "${{ inputs.source_build_sha }}" ]; then
            RID="$(gh run list --limit 50 --json databaseId,headSha,status,conclusion --jq '.[] | select(.headSha=="${{ inputs.source_build_sha }}" and .status=="completed" and .conclusion=="success") | .databaseId' | head -n1)"
            if [ -n "${RID}" ]; then
              echo "run_id=${RID}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Unable to resolve source run for sha ${{ inputs.source_build_sha }}" >&2
            exit 1
          fi
          echo "run_id=${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-

      - name: Download iOS artifact from S3
        id: s3_download_ios
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          RUN_ID="${{ steps.resolve_run.outputs.run_id }}"
          KEY="s3://${S3_ARTIFACT_BUCKET}/${S3_ARTIFACT_PREFIX}${GITHUB_REPOSITORY}/${RUN_ID}/iOS/bundle.tar.gz"
          ARCHIVE="${RUNNER_TEMP}/iOS.tar.gz"
          aws s3 cp "${KEY}" "${ARCHIVE}"
          mkdir -p build
          tar -xzf "${ARCHIVE}" -C build

      - name: Download iOS Artifact (GitHub fallback)
        if: steps.s3_download_ios.outcome == 'failure'
        uses: actions/download-artifact@v4
        with:
          name: iOS
          path: build

      - name: Install CocoaPods
        run: |
          cd "$IOS_BUILD_PATH/iOS"
          if [ -f "Podfile" ]; then
            pod install --repo-update
          else
            echo "No Podfile found, skipping pod install."
          fi

      - name: List Xcode projects under build (diagnostic)
        run: find build -name "*.xcodeproj" -maxdepth 8 2>/dev/null || true

      - name: Build and upload TestFlight with fastlane
        env:
          # fastlane match (S3) needs AWS credentials; otherwise the SDK tries EC2 IMDS (169.254.169.254) and fails on GitHub-hosted runners
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # Match Matchfile: s3_region(ENV["MATCH_S3_REGION"] || "eu-west-1"); SDK also reads AWS_DEFAULT_REGION
          AWS_DEFAULT_REGION: ${{ secrets.MATCH_S3_REGION || 'eu-west-1' }}
          AWS_REGION: ${{ secrets.MATCH_S3_REGION || 'eu-west-1' }}
          APPLE_CONNECT_EMAIL: ${{ secrets.APPLE_CONNECT_EMAIL }}
          APPLE_DEVELOPER_EMAIL: ${{ secrets.APPLE_DEVELOPER_EMAIL }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_P8: ${{ secrets.APPSTORE_P8 }}
          IOS_BUNDLE_ID: com.stonesandice.masterblaster
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
          MATCH_S3_BUCKET: ${{ secrets.MATCH_S3_BUCKET }}
          MATCH_S3_REGION: ${{ secrets.MATCH_S3_REGION }}
        run: |
          XCODE_APP_PATH="$(ls -1d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -n 1 || true)"
          if [ -z "${XCODE_APP_PATH}" ]; then
            echo "No Xcode 26 installation found on runner. Installed Xcode apps:" >&2
            ls -1d /Applications/Xcode*.app 2>/dev/null >&2 || true
            exit 1
          fi
          echo "Selecting Xcode app at ${XCODE_APP_PATH}"
          sudo xcode-select --switch "${XCODE_APP_PATH}"
          xcodebuild -version
          IOS_SDK_VERSION="$(xcrun --sdk iphoneos --show-sdk-version)"
          echo "Detected iPhoneOS SDK: ${IOS_SDK_VERSION}"
          IOS_SDK_VERSION="${IOS_SDK_VERSION}" python3 - <<'PY'
          import os
          import sys
          
          sdk_version = os.environ.get("IOS_SDK_VERSION", "").strip()
          min_major = 26
          if not sdk_version:
              print("Unable to determine iPhoneOS SDK version from xcrun.", file=sys.stderr)
              sys.exit(1)
          
          try:
              sdk_major = int(sdk_version.split(".", 1)[0])
          except ValueError:
              print(f"Unexpected SDK version format: {sdk_version}", file=sys.stderr)
              sys.exit(1)
          
          if sdk_major < min_major:
              print(
                  f"iPhoneOS SDK {sdk_version} is below required iOS {min_major}.x baseline.",
                  file=sys.stderr,
              )
              sys.exit(1)
          print(f"SDK requirement check passed with iPhoneOS SDK {sdk_version}.")
          PY
          bundle config set path 'vendor/bundle'
          bundle install
          bundle exec fastlane ios beta

      - name: Upload iOS publish logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-testflight-logs
          path: |
            fastlane/logs
            fastlane/report.xml
            ~/Library/Logs/gym
            ~/Library/Logs/scan
          if-no-files-found: warn
