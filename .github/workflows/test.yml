name: Test

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  test-editmode:
    name: Edit Mode tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Run Edit Mode tests
        id: tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          testMode: editmode
          customParameters: -assemblyNames "Tests.EditMode"
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          coverageOptions: "generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;generateAdditionalReports;assemblyFilters:+Scripts;pathFilters:-**/Tests/**"
          checkName: Edit Mode Test Results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Edit Mode test results
          path: artifacts

      - name: Upload coverage results
        uses: actions/upload-artifact@v4
        if: always() && steps.tests.outputs.coveragePath != ''
        with:
          name: Coverage results
          path: ${{ steps.tests.outputs.coveragePath }}

      - name: Upload coverage to Codecov
        if: steps.tests.outputs.coveragePath != ''
        uses: codecov/codecov-action@v4
        with:
          directory: ${{ steps.tests.outputs.coveragePath }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  test-playmode:
    name: Play Mode tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Run Play Mode tests
        id: tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          testMode: playmode
          customParameters: -assemblyNames "Tests.PlayMode"
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: Play Mode Test Results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Play Mode test results
          path: artifacts
