name: Build 😎

on:
  push:
    branches:
      - main
      - develop
  # pull_request:
  #   branches:
  #     - main
  #     - develop
  workflow_dispatch:

#env:
#  projectPath: unity-sample # Change this if you move the Unity project.

jobs:
  build:
    name: Build Unity project ✨ on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Run every matrix leg to completion; default fail-fast cancels siblings when one fails.
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            targetPlatform: StandaloneOSX
            artifactName: macOS
            customImage: ''
          - os: windows-latest
            targetPlatform: StandaloneWindows64
            artifactName: Windows
            customImage: unity-ci-win-blender:local
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup third-party assets from S3
        uses: ./.github/actions/setup-thirdparty-assets
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          s3-object-key: ${{ vars.S3_THIRDPARTY_OBJECT_KEY || '3rdparty-ci.zip' }}

      - name: Cache
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      # Unity imports .blend via an external Blender binary; CI runners do not include it by default.
      - name: Install Blender (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install --cask blender
          sudo ln -sf /Applications/Blender.app/Contents/MacOS/Blender /usr/local/bin/blender

      - name: Build Unity Docker image with Blender (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $raw = Get-Content "ProjectSettings/ProjectVersion.txt" -Raw
          if ($raw -notmatch '(?m)^m_EditorVersion:\s*(.+)\s*$') { throw "Could not read m_EditorVersion from ProjectSettings/ProjectVersion.txt" }
          $version = $Matches[1].Trim()
          $base = "unityci/editor:windows-$version-windows-il2cpp-3"
          docker pull $base
          docker build `
            --build-arg "UNITY_IMAGE=$base" `
            -f .github/docker/UnityEditorWindowsBlender.dockerfile `
            -t unity-ci-win-blender:local `
            .

      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }} # See https://game.ci/docs/github/activation
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}
          allowDirtyBuild: true
          customImage: ${{ matrix.customImage }}
          # projectPath: ${{ env.projectPath }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: build
